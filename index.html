*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
:root{
  --sky1:#aee9ff; --sky2:#d7f4ff; --grass:#8bd450; --grass2:#5fb733;
  --ink:#2e3b52; --gold:#ffb830; --gold2:#ff9416;
  --more:#4ec3a6; --less:#ff8aa3; --pink:#ff7aa2; --blue:#4aa8ff;
  --card:#ffffff; --shadow:rgba(46,59,82,.22);
}
html,body{height:100%;}
body{
  font-family:'Fredoka','Trebuchet MS',system-ui,sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 55%);
  overflow:hidden;position:fixed;inset:0;
  -webkit-text-size-adjust:100%;
}
/* sky scenery */
.sun{position:fixed;top:-46px;right:-46px;width:170px;height:170px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,#fff3b0,#ffd84a 60%,#ffc01e);
  box-shadow:0 0 60px rgba(255,210,60,.7);z-index:0;}
.cloud{position:fixed;background:#fff;border-radius:50px;opacity:.9;z-index:0;
  box-shadow:0 8px 0 rgba(46,59,82,.05);}
.cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%;}
.c1{width:120px;height:34px;top:90px;left:6%;}
.c1::before{width:54px;height:54px;top:-26px;left:18px;}
.c1::after{width:40px;height:40px;top:-18px;left:62px;}
.c2{width:90px;height:26px;top:150px;right:8%;}
.c2::before{width:42px;height:42px;top:-20px;left:14px;}
.c2::after{width:32px;height:32px;top:-12px;left:46px;}
.grass{position:fixed;left:0;right:0;bottom:0;height:14vh;min-height:90px;z-index:0;
  background:linear-gradient(180deg,var(--grass),var(--grass2));
  border-top:6px solid #6bc23a;}
.grass::before{content:"";position:absolute;top:-16px;left:0;right:0;height:18px;
  background:radial-gradient(circle at 12px 18px,var(--grass) 11px,transparent 12px) repeat-x;
  background-size:24px 18px;}

/* layout */
#app{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
.screen{flex:1;display:none;flex-direction:column;min-height:0;}
.screen.active{display:flex;}

/* top bar */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px 6px;}
.iconbtn{width:54px;height:54px;border:none;border-radius:18px;background:#fff;
  box-shadow:0 5px 0 var(--shadow);font-size:26px;cursor:pointer;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;transition:transform .08s;}
.iconbtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--shadow);}
.iconbtn.off{opacity:.45;}
.wk-pill{flex:1;text-align:center;font-size:clamp(20px,3.2vw,30px);font-weight:600;
  background:#fff;border-radius:20px;padding:8px 14px;box-shadow:0 5px 0 var(--shadow);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.starcount{flex:0 0 auto;background:var(--gold);color:#fff;border-radius:20px;
  padding:8px 16px;font-size:24px;font-weight:600;box-shadow:0 5px 0 var(--gold2);}

/* ---------- HOME ---------- */
#home{justify-content:center;align-items:center;gap:18px;padding:18px;}
.logo-wrap{text-align:center;margin-bottom:4px;display:flex;flex-direction:column;align-items:center;}
.brandlogo{width:min(86vw,400px);margin:2px auto 0;
  filter:drop-shadow(0 4px 8px rgba(46,59,82,.16));}
.brandlogo svg{width:100%;height:auto;display:block;}
.gamechip{font-size:clamp(16px,2.8vw,22px);font-weight:600;color:var(--ink);
  background:#fff;display:inline-block;padding:7px 20px;border-radius:30px;margin-top:14px;
  box-shadow:0 4px 0 var(--shadow);}
.bunny{font-size:clamp(42px,8vw,66px);line-height:1;animation:hop 2.4s ease-in-out infinite;}
@keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.worlds{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;width:100%;max-width:1120px;}
.world{flex:1 1 256px;max-width:340px;cursor:pointer;border:none;text-align:left;
  border-radius:30px;padding:22px 22px 20px;color:#fff;position:relative;
  box-shadow:0 9px 0 rgba(46,59,82,.28);transition:transform .1s;overflow:hidden;}
.world:active{transform:translateY(5px);box-shadow:0 4px 0 rgba(46,59,82,.28);}
.world.w4{background:linear-gradient(135deg,#9ce06a,#52bf3a);}
.world.w5{background:linear-gradient(135deg,#ffcf4d,#ff9d2e);}
.world.w6{background:linear-gradient(135deg,#7ad0ff,#4a8dff);}
.world .wk{display:inline-block;background:rgba(255,255,255,.3);border-radius:14px;
  padding:3px 12px;font-size:18px;font-weight:600;margin-bottom:8px;}
.world .emoji{font-size:56px;line-height:1;}
.world .name{font-size:clamp(24px,4vw,32px);font-weight:700;margin-top:4px;}
.world .desc{font-size:16px;font-weight:500;opacity:.95;margin-top:2px;}
.foot{font-size:14px;color:var(--ink);opacity:.7;font-weight:500;text-align:center;margin-top:6px;}

/* ---------- GAME PLAY ---------- */
.qcard{margin:6px 16px 4px;background:#fff;border-radius:24px;padding:14px 16px;
  box-shadow:0 6px 0 var(--shadow);display:flex;align-items:center;gap:12px;}
.qtext{flex:1;font-size:clamp(22px,3.8vw,34px);font-weight:600;line-height:1.15;}
.hearbtn{flex:0 0 auto;width:58px;height:58px;border:none;border-radius:50%;
  background:var(--gold);color:#fff;font-size:28px;box-shadow:0 5px 0 var(--gold2);cursor:pointer;}
.hearbtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--gold2);}

.playarea{flex:1;display:flex;align-items:center;justify-content:center;
  padding:6px 14px;min-height:0;gap:16px;}

/* two big panels (more/less + same-or-different image pair) */
.mlwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;width:100%;height:100%;}
.panels{display:flex;gap:18px;width:100%;max-width:820px;flex:1;min-height:0;align-items:stretch;}
.panel{flex:1;background:var(--card);border-radius:28px;border:6px solid #e7eefc;
  box-shadow:0 8px 0 var(--shadow);cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px 14px 12px;transition:transform .1s,border-color .15s;overflow:hidden;}
.panel:active{transform:scale(.98);}
.panel.right{border-color:#e7eefc;}
.panel.correct{border-color:var(--more);background:#eafff8;animation:pop .4s;}
.panel.wrong{border-color:var(--less);}
.panel.choosable{animation:invite 1.5s ease-in-out infinite;}
@keyframes invite{0%,100%{box-shadow:0 8px 0 var(--shadow);}
  50%{box-shadow:0 8px 0 var(--shadow),0 0 0 7px rgba(74,168,255,.30);}}
.countbox{display:flex;align-items:center;gap:8px;margin-top:8px;flex:0 0 auto;
  font-weight:700;color:var(--ink);font-size:clamp(18px,3.2vw,24px);}
.countlbl{opacity:.65;}
.grid{display:flex;flex-wrap:wrap;gap:8px 6px;align-items:center;align-content:center;
  justify-content:center;width:100%;flex:1;min-height:0;max-width:340px;}
.grid .it{font-size:clamp(32px,8vw,64px);line-height:1.05;}
.numbadge{position:absolute;top:8px;left:8px;background:var(--blue);color:#fff;
  width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;box-shadow:0 4px 0 rgba(46,59,82,.18);opacity:0;transition:opacity .2s;}
.panel.show-num .numbadge{opacity:1;}

/* odd-one-out row */
.oddrow{display:flex;gap:14px;width:100%;max-width:860px;justify-content:center;flex-wrap:wrap;}
.oddcell{flex:1 1 0;min-width:120px;max-width:200px;aspect-ratio:1/1;background:#fff;
  border-radius:26px;border:6px solid #e7eefc;box-shadow:0 7px 0 var(--shadow);
  display:flex;align-items:center;justify-content:center;font-size:clamp(48px,13vw,96px);
  cursor:pointer;transition:transform .1s,border-color .15s;}
.oddcell:active{transform:scale(.97);}
.oddcell.correct{border-color:var(--more);background:#eafff8;animation:pop .4s;}
.oddcell.wrong{border-color:var(--less);}

/* same/different big pair + answer buttons */
.sdwrap{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}
.sdpair{display:flex;gap:18px;align-items:center;justify-content:center;}
.sdbox{width:clamp(110px,28vw,180px);height:clamp(110px,28vw,180px);background:#fff;
  border-radius:28px;border:6px solid #e7eefc;box-shadow:0 7px 0 var(--shadow);
  display:flex;align-items:center;justify-content:center;font-size:clamp(60px,16vw,120px);}
.vs{font-size:30px;font-weight:700;color:var(--ink);opacity:.5;}
.sdbtns{display:flex;gap:18px;}
.sdbtn{border:none;border-radius:24px;padding:16px 30px;font-family:inherit;font-weight:600;
  font-size:clamp(22px,4vw,30px);color:#fff;cursor:pointer;box-shadow:0 7px 0 rgba(46,59,82,.25);}
.sdbtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(46,59,82,.25);}
.sdbtn.same{background:linear-gradient(135deg,#5ad0b0,#36b58f);}
.sdbtn.diff{background:linear-gradient(135deg,#ff9bb3,#ff6f93);}
.sdbtn .ic{font-size:26px;margin-right:6px;}
.sdbtn.chosen-ok{outline:5px solid #2e9e7f;}
.sdbtn.chosen-no{outline:4px solid #ff6f93;outline-offset:2px;}

/* week 4 — addition "how many altogether?" */
.addwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:22px;width:100%;}
.addtray{background:#fff;border-radius:30px;border:6px solid #e7eefc;
  box-shadow:0 8px 0 var(--shadow);display:flex;align-items:center;justify-content:center;
  gap:8px;padding:18px 22px;flex-wrap:wrap;max-width:780px;}
.addgroup{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;
  max-width:280px;}
.addgroup .it{font-size:clamp(32px,6.5vw,56px);line-height:1.05;}
.plus{font-size:clamp(38px,7vw,60px);font-weight:700;color:#52bf3a;margin:0 8px;}
.choices{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.choice{width:clamp(78px,15vw,108px);height:clamp(78px,15vw,108px);border:none;border-radius:26px;
  font-family:inherit;font-weight:700;color:#fff;font-size:clamp(34px,7vw,48px);cursor:pointer;
  background:linear-gradient(135deg,#9ce06a,#52bf3a);box-shadow:0 7px 0 #3f9e2a;transition:transform .1s;}
.choice:active{transform:translateY(4px);box-shadow:0 2px 0 #3f9e2a;}
.choice.correct{outline:6px solid #2e9e7f;animation:pop .4s;}
.choice.wrong{opacity:.4;}
.choice:disabled{opacity:.35;}

/* week 4 — compare two addition amounts (with sum entry) */
.cmppair{display:flex;align-items:flex-start;justify-content:center;gap:12px;flex-wrap:wrap;}
.cmptray{background:#fff;border-radius:26px;border:6px solid #e7eefc;box-shadow:0 7px 0 var(--shadow);
  padding:14px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  min-width:150px;max-width:320px;}
.cmpobjs{display:flex;align-items:center;justify-content:center;gap:5px;flex-wrap:wrap;}
.cmptray .it{font-size:clamp(24px,4.6vw,38px);line-height:1.05;}
.cmptray .plus{font-size:clamp(24px,4.4vw,34px);margin:0 3px;}
.cmpeq{display:flex;align-items:center;gap:8px;font-size:clamp(24px,4.4vw,32px);font-weight:700;color:var(--ink);
  border-top:3px dashed #e0e8f6;padding-top:10px;}
.blank{min-width:50px;height:54px;padding:0 8px;border-radius:14px;border:3px dashed #b9c6e0;
  background:#f3f8ff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;
  color:#9aa7c0;cursor:pointer;transition:transform .1s,border-color .15s,background .15s;}
.blank.active{border-style:solid;border-color:#8fbfff;background:#f3f8ff;color:var(--ink);
  box-shadow:0 0 0 3px rgba(74,168,255,.22);}
.blank.filled{border-style:solid;border-color:var(--more);background:#eafff8;color:#2e9e7f;cursor:default;}
.blank.bad{border-color:var(--less);background:#fff0f4;}
.qmark{font-size:clamp(28px,6vw,44px);font-weight:700;color:var(--ink);opacity:.5;align-self:center;
  padding-top:18px;}
.numpad{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:620px;
  transition:opacity .2s;}
.numpad.done{opacity:.35;pointer-events:none;}
.numkey{width:clamp(48px,7.6vw,64px);height:clamp(48px,7.6vw,64px);border:none;border-radius:16px;
  background:#fff;box-shadow:0 5px 0 var(--shadow);font-family:inherit;font-weight:700;
  font-size:clamp(24px,4.6vw,32px);color:var(--ink);cursor:pointer;transition:transform .1s;}
.numkey:active{transform:translateY(4px);box-shadow:0 1px 0 var(--shadow);}
.sdbtns.locked{opacity:.4;pointer-events:none;filter:grayscale(.35);}
.cmpcue{max-width:520px;text-align:center;background:#eafff8;border:3px solid #b8f0df;
  color:#2e9e7f;font-weight:700;font-size:clamp(17px,3.1vw,23px);border-radius:20px;
  padding:8px 18px;box-shadow:0 5px 0 var(--shadow);opacity:0;height:0;padding-top:0;padding-bottom:0;
  overflow:hidden;transition:opacity .2s;}
.cmpcue.show{opacity:1;height:auto;padding-top:8px;padding-bottom:8px;}

/* feedback banner */
.fb{position:fixed;left:50%;bottom:calc(14vh + 62px);transform:translateX(-50%) translateY(40px);
  background:#fff;border-radius:26px;padding:14px 26px;font-size:clamp(22px,4.2vw,34px);
  font-weight:700;box-shadow:0 8px 0 var(--shadow);opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;z-index:30;white-space:nowrap;}
.fb.show{opacity:1;transform:translateX(-50%) translateY(0);}
.fb.ok{color:#2e9e7f;border:4px solid #b8f0df;}
.fb.try{color:#e0608a;border:4px solid #ffd3e0;}

/* progress dots */
.progress{display:flex;gap:8px;justify-content:center;padding:8px 0 14px;flex-wrap:wrap;}
.dot{width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 3px 0 var(--shadow);
  display:flex;align-items:center;justify-content:center;font-size:16px;}
.dot.done{background:var(--gold);box-shadow:0 3px 0 var(--gold2);}
.dot.cur{outline:4px solid #fff;outline-offset:2px;transform:scale(1.12);}

/* ---------- WIN ---------- */
#win{justify-content:center;align-items:center;text-align:center;gap:8px;padding:18px;}
.win-bunny{font-size:90px;animation:hop 1.6s ease-in-out infinite;}
.win-title{font-size:clamp(34px,7vw,58px);font-weight:700;color:#fff;
  text-shadow:0 5px 0 var(--gold2),0 8px 14px rgba(46,59,82,.25);}
.win-stars{font-size:clamp(40px,9vw,72px);letter-spacing:6px;margin:6px 0;}
.win-msg{font-size:clamp(18px,3vw,26px);font-weight:500;background:#fff;border-radius:24px;
  padding:10px 22px;box-shadow:0 5px 0 var(--shadow);}
.bigbtn{border:none;border-radius:26px;padding:18px 40px;font-family:inherit;font-weight:700;
  font-size:clamp(22px,4vw,30px);color:#fff;cursor:pointer;margin-top:10px;
  background:linear-gradient(135deg,#ffcf4d,#ff9d2e);box-shadow:0 8px 0 var(--gold2);}
.bigbtn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--gold2);}
.bigbtn.blue{background:linear-gradient(135deg,#7ad0ff,#4a8dff);box-shadow:0 8px 0 #2f74e0;}
.winrow{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}

/* confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:40;}

@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}
  40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
#app.shaking{animation:scrShake .45s ease;}
@keyframes scrShake{0%,100%{transform:translateX(0)}12%{transform:translateX(-8px)}
  26%{transform:translateX(8px)}40%{transform:translateX(-6px)}54%{transform:translateX(6px)}
  68%{transform:translateX(-4px)}82%{transform:translateX(3px)}}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;}
}
@media (max-height:560px){
  .grass{height:70px;min-height:70px;}
  .qcard{padding:10px 14px;}
}

<script>
/* ============================ ESL CLUBHOUSE — Weeks 5 & 6 ============================ */
(function(){
"use strict";

/* ---------- sound state ---------- */
var SOUND = true;
try{ var s = localStorage.getItem('mld_sound'); if(s!==null) SOUND = s==='1'; }catch(e){}

/* ---------- Web Audio (offline chimes) ---------- */
var AC=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(AC && AC.state==='suspended') AC.resume(); return AC; }
function tone(freq,start,dur,type,vol){
  var ac=audio(); if(!ac||!SOUND) return;
  var o=ac.createOscillator(), g=ac.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  o.connect(g); g.connect(ac.destination);
  var t=ac.currentTime+start;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
function sndGood(){ tone(523,0,.13,'triangle',.2); tone(659,.1,.13,'triangle',.2); tone(784,.2,.22,'triangle',.22); }
function sndCorrect(){ tone(523.25,0,.12,'triangle',.22); tone(659.25,.10,.12,'triangle',.22); tone(783.99,.20,.14,'triangle',.24); tone(1046.5,.32,.30,'triangle',.26); tone(1568,.34,.30,'sine',.10); }
function sndTry(){ tone(330,0,.16,'sine',.16); tone(247,.13,.2,'sine',.16); }
function sndStar(){ tone(880,0,.1,'triangle',.18); tone(1175,.09,.18,'triangle',.18); }
function sndTap(){ tone(420,0,.06,'square',.08); }
function wrongFx(){
  sndTry();
  try{ if(navigator.vibrate) navigator.vibrate([70,40,70]); }catch(e){}
  var app=document.getElementById('app');
  if(app){ app.classList.remove('shaking'); void app.offsetWidth; app.classList.add('shaking');
    setTimeout(function(){ app.classList.remove('shaking'); },480); }
}

/* ---------- Speech (offline TTS) ---------- */
var VOICE=null;
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  var vs=speechSynthesis.getVoices()||[];
  var pref=['Samantha','Karen','Moira','Tessa','Google US English','Daniel'];
  for(var i=0;i<pref.length;i++){ for(var j=0;j<vs.length;j++){ if(vs[j].name.indexOf(pref[i])>-1){VOICE=vs[j];return;} } }
  for(var k=0;k<vs.length;k++){ if(/en[-_]/i.test(vs[k].lang)){VOICE=vs[k];return;} }
  if(vs.length) VOICE=vs[0];
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function say(txt,cb){
  if(!('speechSynthesis' in window)){ if(cb) cb(); return; }
  try{ speechSynthesis.cancel(); }catch(e){}
  if(!SOUND){ if(cb) cb(); return; }
  var u=new SpeechSynthesisUtterance(txt);
  u.rate=0.92; u.pitch=1.12; u.volume=1;
  if(VOICE) u.voice=VOICE;
  if(cb){ u.onend=cb; u.onerror=cb; }
  try{ speechSynthesis.speak(u); }catch(e){ if(cb) cb(); }
}

/* ---------- helpers ---------- */
function $(id){ return document.getElementById(id); }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
function numWord(n){ return ['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve'][n]||(''+n); }
function show(scr){ ['home','game','win'].forEach(function(id){ $(id).classList.toggle('active',id===scr); }); }

/* ---------- progress / stars storage ---------- */
function getStars(week){ try{ return parseInt(localStorage.getItem('mld_stars_'+week)||'0',10); }catch(e){ return 0; } }
function setStars(week,n){ try{ localStorage.setItem('mld_stars_'+week,n); }catch(e){} }
function starRow(n,max){ var s=''; for(var i=0;i<max;i++) s+= i<n?'⭐':'☆'; return s; }
function renderHomeStars(){ /* personal-best display removed for a cleaner home screen */ }

/* =========================================================================
   ROUND DATA
   ========================================================================= */
/* WEEK 5 — More or Less : compare two amounts (number recognition + counting) */
var W5 = [
  {type:'more', item:'🥕', word:'carrots', a:5, b:2},
  {type:'more', item:'🧤', word:'gloves',  a:3, b:2},
  {type:'less', item:'🐟', word:'fish',    a:4, b:2},
  {type:'more', item:'🥦', word:'broccoli',a:6, b:4},
  {type:'less', item:'🧒', word:'children', a:4, b:2},
  {type:'more', item:'🍎', word:'apples',  a:3, b:5},
  {type:'less', item:'⭐', word:'stars',   a:6, b:3},
  {type:'more', item:'🌸', word:'flowers', a:4, b:7}
];

/* WEEK 6 — Same or Different : find the different one + same/different judgement */
var W6 = [
  {kind:'odd', items:['✏️','✏️','🖊️','✏️'], odd:2},
  {kind:'sd',  left:'🍎', right:'🍎', same:true},
  {kind:'odd', items:['🍎','🍎','🍎','🍏'], odd:3},
  {kind:'sd',  left:'🐶', right:'🐱', same:false},
  {kind:'odd', items:['🌻','🌷','🌻','🌻'], odd:1},
  {kind:'sd',  left:'⭐', right:'⭐', same:true},
  {kind:'odd', items:['🎂','🎂','🧁','🎂'], odd:2},
  {kind:'sd',  left:'🦋', right:'🐝', same:false}
];

/* WEEK 4 — Adding Up : "how many altogether?" + review same/different through addition */
var W4 = [
  {kind:'add', item:'🍎', a:2, b:1},
  {kind:'cmp', item:'🍓', a:2, b:2, c:1, d:3},   /* 4 vs 4 -> same */
  {kind:'add', item:'🐟', a:3, b:2},
  {kind:'cmp', item:'🐝', a:3, b:1, c:2, d:1},   /* 4 vs 3 -> different */
  {kind:'add', item:'⭐', a:4, b:3},
  {kind:'cmp', item:'🌸', a:2, b:1, c:1, d:2},   /* 3 vs 3 -> same */
  {kind:'add', item:'🧁', a:3, b:2},
  {kind:'cmp', item:'🥕', a:3, b:2, c:2, d:1}    /* 5 vs 3 -> different */
];

/* =========================================================================
   GAME ENGINE
   ========================================================================= */
var state = { week:5, rounds:[], idx:0, stars:0, locked:false };

function startWeek(week){
  state.week = week;
  state.idx = 0;
  state.stars = 0;
  state.locked = false;
  if(week===4){
    state.rounds = shuffle(W4);
    $('wkPill').textContent = 'Week 4 · Adding Up';
  }else if(week===5){
    state.rounds = shuffle(W5);
    $('wkPill').textContent = 'Week 5 · More or Less';
  }else{
    state.rounds = shuffle(W6);
    $('wkPill').textContent = 'Week 6 · Same or Different';
  }
  updateLiveStars();
  buildProgress();
  show('game');
  renderRound();
}

function updateLiveStars(){ $('liveStars').textContent = '⭐ '+state.stars; }
function buildProgress(){
  var p=$('progress'); p.innerHTML='';
  for(var i=0;i<state.rounds.length;i++){
    var d=document.createElement('div'); d.className='dot'; d.dataset.i=i; p.appendChild(d);
  }
  refreshProgress();
}
function refreshProgress(){
  var dots=$('progress').children;
  for(var i=0;i<dots.length;i++){
    dots[i].classList.toggle('done', i<state.idx);
    dots[i].classList.toggle('cur', i===state.idx);
    dots[i].textContent = i<state.idx ? '⭐' : '';
  }
}

function renderRound(){
  state.locked=false;
  refreshProgress();
  var pa=$('playarea'); pa.innerHTML='';
  hideFB();
  if(state.week===4) renderWeek4(pa, state.rounds[state.idx]);
  else if(state.week===5) renderMoreLess(pa, state.rounds[state.idx]);
  else renderWeek6(pa, state.rounds[state.idx]);
}

/* ---------- WEEK 5 : MORE / LESS ---------- */
function makeGrid(item,count){
  var g=document.createElement('div'); g.className='grid';
  for(var i=0;i<count;i++){ var sp=document.createElement('span'); sp.className='it'; sp.textContent=item; g.appendChild(sp); }
  return g;
}
function renderMoreLess(pa, r){
  var sides = Math.random()<0.5 ? [r.a,r.b] : [r.b,r.a];
  var big = Math.max(r.a,r.b), small=Math.min(r.a,r.b);
  var correctVal = (r.type==='more') ? big : small;

  $('qtext').textContent = 'Count each group. Tap the number. 🔢';

  var wrap=document.createElement('div'); wrap.className='mlwrap';
  var panels=document.createElement('div'); panels.className='panels';

  var P=[];
  [0,1].forEach(function(k){
    var count=sides[k];
    var p=document.createElement('div'); p.className='panel'+(k===1?' right':'');
    p.appendChild(makeGrid(r.item,count));
    var box=document.createElement('div'); box.className='countbox';
    var lbl=document.createElement('span'); lbl.className='countlbl'; lbl.textContent='I count';
    var blank=document.createElement('div'); blank.className='blank'; blank.textContent='?';
    box.appendChild(lbl); box.appendChild(blank);
    p.appendChild(box);
    var obj={el:p, blank:blank, count:count, done:false};
    p.addEventListener('click',function(){ onPanel(obj); });
    P.push(obj);
    panels.appendChild(p);
  });

  var hi=Math.max(8, big+1);
  var pad=document.createElement('div'); pad.className='numpad';
  for(var n=1;n<=hi;n++){ (function(v){
    var key=document.createElement('button'); key.className='numkey'; key.textContent=v;
    key.addEventListener('click',function(){ onNum(v); });
    pad.appendChild(key);
  })(n); }

  var cue=document.createElement('div'); cue.className='cmpcue';

  wrap.appendChild(panels); wrap.appendChild(pad); wrap.appendChild(cue);
  pa.appendChild(wrap);

  var active=0, comparing=false;
  setActive(0);
  function setActive(i){ active=i; P.forEach(function(o,idx){ o.blank.classList.toggle('active', idx===i && !o.done); }); }
  function firstUndone(){ for(var i=0;i<P.length;i++){ if(!P[i].done) return i; } return -1; }

  function onPanel(o){
    if(comparing){ choose(o); }
    else if(!o.done){ setActive(P.indexOf(o)); }
  }
  function onNum(v){
    if(comparing) return;
    sndTap();
    if(P[active].done){ var f=firstUndone(); if(f<0) return; setActive(f); }
    var o=P[active];
    if(v===o.count){
      o.blank.textContent=v; o.blank.classList.remove('active','bad'); o.blank.classList.add('filled');
      o.done=true; sndStar();
      var f2=firstUndone();
      if(f2<0) ready2(); else setActive(f2);
    }else{
      o.blank.classList.add('bad'); wrongFx();
      showFB('try','Count again! 🔢'); say('Count again.');
      setTimeout(function(){ o.blank.classList.remove('bad'); },450);
    }
  }
  function ready2(){
    comparing=true;
    hideFB();
    pad.classList.add('done');
    $('qtext').textContent = (r.type==='more') ? 'Which group has more?' : 'Which group has less?';
    P.forEach(function(o){ o.el.classList.add('choosable'); });
    cue.textContent='You found '+P[0].count+' and '+P[1].count+'. Now tap the group with '+r.type+' 👇';
    cue.classList.add('show');
    say('You found '+numWord(P[0].count)+', and '+numWord(P[1].count)+'. Which group has '+r.type+'?');
  }
  function choose(o){
    if(state.locked) return;
    sndTap();
    if(o.count===correctVal){
      state.locked=true;
      o.el.classList.remove('choosable'); o.el.classList.add('correct');
      award();
      var frame = cap(numWord(correctVal))+' is '+r.type+'!';
      showFB('ok', o.count+' '+r.item+' is '+r.type+'!');
      say(frame, nextSoon);
    }else{
      o.el.classList.add('wrong'); wrongFx();
      showFB('try', r.type==='more'?'Look again — find more!':'Look again — find less!');
      say(r.type==='more'?'Try again. Find more.':'Try again. Find less.');
      setTimeout(function(){ o.el.classList.remove('wrong'); },450);
    }
  }

  setTimeout(function(){ say('Count each group, and tap the number.'); },180);
}

/* ---------- WEEK 6 : SAME / DIFFERENT ---------- */
function renderWeek6(pa, r){
  if(r.kind==='odd') renderOdd(pa,r); else renderSD(pa,r);
}
function renderOdd(pa, r){
  $('qtext').textContent = 'Find the one that is different. Tap it!';
  var row=document.createElement('div'); row.className='oddrow';
  r.items.forEach(function(em,i){
    var c=document.createElement('div'); c.className='oddcell'; c.textContent=em;
    c.addEventListener('click',function(){ chooseOdd(c,i,r); });
    row.appendChild(c);
  });
  pa.appendChild(row);
  setTimeout(function(){ say('Find the one that is different. Tap it!'); },180);
}
function chooseOdd(cell, i, r){
  if(state.locked) return;
  sndTap();
  if(i===r.odd){
    state.locked=true;
    cell.classList.add('correct');
    award();
    showFB('ok','Yes! It is different! '+r.items[i]);
    say('Yes! It is different!', nextSoon);
  }else{
    cell.classList.add('wrong');
    wrongFx();
    showFB('try','That one is the same. Try again!');
    say('That one is the same. Try again.');
    setTimeout(function(){ cell.classList.remove('wrong'); },450);
  }
}
function renderSD(pa, r){

function chooseSD(btn, pickedSame, r){

/* ---------- WEEK 4 : ADDING UP (addition + same/different review) ---------- */
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function addGroup(item,count){
  var g=document.createElement('div'); g.className='addgroup';
  for(var i=0;i<count;i++){ var sp=document.createElement('span'); sp.className='it'; sp.textContent=item; g.appendChild(sp); }
  return g;
}
function addChoices(total){
  var have={}; have[total]=1; var out=[total];
  var cand=[total+1,total-1,total+2,total-2,total+3];
  for(var i=0;i<cand.length && out.length<3;i++){ var v=cand[i]; if(v>=0 && v<=15 && !have[v]){ have[v]=1; out.push(v); } }
  while(out.length<3){ var r=total+1+out.length; if(!have[r]){ have[r]=1; out.push(r); } }
  return shuffle(out);
}
function renderWeek4(pa, r){
  if(r.kind==='add') renderAdd(pa,r); else renderCmp(pa,r);
}
function renderAdd(pa, r){
  var total=r.a+r.b;
  $('qtext').textContent='How many altogether? '+r.item;
  var wrap=document.createElement('div'); wrap.className='addwrap';
  var tray=document.createElement('div'); tray.className='addtray';
  tray.appendChild(addGroup(r.item,r.a));
  var plus=document.createElement('div'); plus.className='plus'; plus.textContent='+';
  tray.appendChild(plus);
  tray.appendChild(addGroup(r.item,r.b));
  wrap.appendChild(tray);
  var ch=document.createElement('div'); ch.className='choices';
  addChoices(total).forEach(function(v){
    var b=document.createElement('button'); b.className='choice'; b.textContent=v;
    b.addEventListener('click',function(){ chooseAdd(b,v,r,total); });
    ch.appendChild(b);
  });
  wrap.appendChild(ch);
  pa.appendChild(wrap);
  setTimeout(function(){ say('How many altogether? Count them all.'); },180);
}
function chooseAdd(btn, val, r, total){
  if(state.locked) return;
  sndTap();
  if(val===total){
    state.locked=true;
    btn.classList.add('correct');
    award();
    showFB('ok', r.a+' + '+r.b+' = '+total+' '+r.item);
    say(numWord(r.a)+' plus '+numWord(r.b)+' is '+numWord(total)+'. '+cap(numWord(total))+' altogether!', nextSoon);
  }else{
    btn.classList.add('wrong'); btn.disabled=true;
    wrongFx();
    showFB('try','Try again. Count them all!');
    say('Try again. Count them all.');
  }
}
function renderCmp(pa, r){
  var lt=r.a+r.b, rt=r.c+r.d, same=(lt===rt);
  $('qtext').textContent='Count each side. Tap the number. 🔢';

  var wrap=document.createElement('div'); wrap.className='sdwrap';
  var pair=document.createElement('div'); pair.className='cmppair';

  var trayA=makeCmpTray(r.item, r.a, r.b);
  var qm=document.createElement('div'); qm.className='qmark'; qm.textContent='?';
  var trayB=makeCmpTray(r.item, r.c, r.d);
  pair.appendChild(trayA.el); pair.appendChild(qm); pair.appendChild(trayB.el);

  // number pad (covers all sums + a few distractors)
  var hi=Math.max(8, lt+1, rt+1), lo=1;
  var pad=document.createElement('div'); pad.className='numpad';
  for(var n=lo;n<=hi;n++){ (function(val){
    var k=document.createElement('button'); k.className='numkey'; k.textContent=val;
    k.addEventListener('click',function(){ onNum(val); });
    pad.appendChild(k);
  })(n); }

  // same / different buttons (locked until both sums entered)
  var btns=document.createElement('div'); btns.className='sdbtns locked';
  var sameBtn=document.createElement('button'); sameBtn.className='sdbtn same'; sameBtn.innerHTML='<span class="ic">✅</span>Same';
  var diffBtn=document.createElement('button'); diffBtn.className='sdbtn diff'; diffBtn.innerHTML='<span class="ic">❌</span>Different';
  sameBtn.addEventListener('click',function(){ judge(sameBtn,true); });
  diffBtn.addEventListener('click',function(){ judge(diffBtn,false); });
  btns.appendChild(sameBtn); btns.appendChild(diffBtn);

  // inline cue shown once both sums are entered (kept in normal flow so it never covers the buttons)
  var cue=document.createElement('div'); cue.className='cmpcue';

  wrap.appendChild(pair); wrap.appendChild(pad); wrap.appendChild(cue); wrap.appendChild(btns);
  pa.appendChild(wrap);

  // --- per-round entry state ---
  var active='A', doneA=false, doneB=false, comparing=false;
  setActive('A');
  function setActive(which){
    active=which;
    trayA.blank.classList.toggle('active', which==='A' && !doneA);
    trayB.blank.classList.toggle('active', which==='B' && !doneB);
  }
  trayA.blank.addEventListener('click',function(){ if(!doneA){ setActive('A'); } });
  trayB.blank.addEventListener('click',function(){ if(!doneB){ setActive('B'); } });

  function onNum(val){
    if(comparing) return;
    sndTap();
    if(active==='A' && !doneA){ checkFill(trayA.blank, val, lt, 'A'); }
    else if(active==='B' && !doneB){ checkFill(trayB.blank, val, rt, 'B'); }
    else if(!doneA){ checkFill(trayA.blank, val, lt, 'A'); }
    else if(!doneB){ checkFill(trayB.blank, val, rt, 'B'); }
  }
  function checkFill(blank, val, target, which){
    if(val===target){
      blank.textContent=val; blank.classList.remove('active','bad'); blank.classList.add('filled');
      if(which==='A'){ doneA=true; } else { doneB=true; }
      sndStar();
      if(doneA && doneB){ ready(); }
      else { setActive(doneA?'B':'A'); }
    }else{
      blank.classList.add('bad');
      wrongFx();
      showFB('try','Count again! 🔢');
      say('Count again.');
      setTimeout(function(){ blank.classList.remove('bad'); },450);
    }
  }
  function ready(){
    comparing=true;
    hideFB();
    pad.classList.add('done');
    btns.classList.remove('locked');
    $('qtext').textContent='Is the amount the same or different?';
    cue.textContent='You found '+lt+' and '+rt+'. Now tap Same or Different 👇';
    cue.classList.add('show');
    say(numWord(lt)+', and '+numWord(rt)+'. Is the amount the same, or different?');
  }
  function judge(btn, pickedSame){
    if(!comparing || state.locked) return;
    sndTap();
    if(pickedSame===same){
      state.locked=true;
      btn.classList.add('chosen-ok');
      award();
      if(same){ showFB('ok','Same! '+lt+' and '+rt+' are equal.'); say('Yes, same! '+numWord(lt)+' and '+numWord(rt)+' are the same.', nextSoon); }
      else { showFB('ok','Different! '+lt+' and '+rt+' are not equal.'); say('No, different! '+numWord(lt)+' and '+numWord(rt)+' are not the same.', nextSoon); }
    }else{
      btn.classList.add('chosen-no');
      wrongFx();
      showFB('try','Look at the two numbers. Try again!');
      say('Look at the two numbers. Try again.');
      setTimeout(function(){ btn.classList.remove('chosen-no'); },450);
    }
  }

  setTimeout(function(){ say('Count each side, and tap the number.'); },180);
}
function makeCmpTray(item,x,y){
  var t=document.createElement('div'); t.className='cmptray';
  var objs=document.createElement('div'); objs.className='cmpobjs';
  for(var i=0;i<x;i++){ var s=document.createElement('span'); s.className='it'; s.textContent=item; objs.appendChild(s); }
  var p=document.createElement('span'); p.className='plus'; p.textContent='+'; objs.appendChild(p);
  for(var j=0;j<y;j++){ var s2=document.createElement('span'); s2.className='it'; s2.textContent=item; objs.appendChild(s2); }
  var eq=document.createElement('div'); eq.className='cmpeq';
  var lead=document.createElement('span'); lead.textContent=x+' + '+y+' =';
  var blank=document.createElement('div'); blank.className='blank'; blank.textContent='?';
  eq.appendChild(lead); eq.appendChild(blank);
  t.appendChild(objs); t.appendChild(eq);
  return { el:t, blank:blank };
}

/* ---------- shared round end ---------- */
function award(){ state.stars++; updateLiveStars(); sndCorrect(); burst(); }
function nextSoon(){ setTimeout(nextRound, 950); }
function nextRound(){
  state.idx++;

/* =========================================================================
   CONFETTI
   ========================================================================= */
var cv=$('confetti'), cx=cv.getContext('2d'), parts=[], raf=null;
function sizeCanvas(){ cv.width=innerWidth; cv.height=innerHeight; }
sizeCanvas(); addEventListener('resize',sizeCanvas);
var COLORS=['#ffb830','#4ec3a6','#ff7aa2','#4aa8ff','#ffd84a','#8bd450'];
function spawn(n,spread){
  for(var i=0;i<n;i++){
    parts.push({x:innerWidth/2+(Math.random()-.5)*spread, y:innerHeight*0.4,
      vx:(Math.random()-.5)*9, vy:-(Math.random()*11+5), g:0.32,
      s:Math.random()*9+6, c:COLORS[(Math.random()*COLORS.length)|0],
      r:Math.random()*6, vr:(Math.random()-.5)*.4, life:90});
  }
  if(!raf) loop();
}
function burst(){ if(window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches) return; spawn(34,160); }
function bigBurst(){ if(window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches) return; spawn(120,innerWidth*0.7); }
function loop(){
  cx.clearRect(0,0,cv.width,cv.height);
  for(var i=parts.length-1;i>=0;i--){
    var p=parts[i]; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life--;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.r); cx.fillStyle=p.c;
    cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); cx.restore();
    if(p.life<=0||p.y>innerHeight+40) parts.splice(i,1);
  }
  if(parts.length) raf=requestAnimationFrame(loop); else { raf=null; cx.clearRect(0,0,cv.width,cv.height); }
}
